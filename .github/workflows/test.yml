name: Simple Check

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check important files exist
        run: |
          test -f index.html || { echo "missing index.html"; exit 1; }
          test -f login.html || { echo "missing login.html"; exit 1; }
          test -f register.html || { echo "missing register.html"; exit 1; }
          echo "All important files exist"